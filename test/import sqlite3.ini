import sqlite3
import math
from collections import Counter

# 1. دالة تهيئة الاتصال (تفعيل الـ LOG)
def create_connection(db_file):
    conn = sqlite3.connect(db_file)
    # تمكين دالة اللوغاريتم داخل SQL باستخدام math.log البايثونية
    conn.create_function("LOG", 1, math.log)
    return conn

# 2. دالة تصنيف الرسالة بالكامل داخل SQLite
def classify_message(message_text, db_path):
    conn = create_connection(db_path)
    cursor = conn.cursor()

    # أ. تجهيز الكلمات في بايثون (تنظيف وتقسيم فقط)
    words_list = message_text.upper().split()
    if not words_list:
        return "HAM" # رسالة فارغة

    # ب. جلب الـ Totals من جدول main (لازمة لحساب الاحتمالية)
    cursor.execute("SELECT ham_total, spam_total FROM main LIMIT 1")
    result = cursor.fetchone()
    if not result:
        return "DB Error: Main table empty"
    h_total, s_total = result
    
    # ج. حساب الـ Prior Log Probabilities (نقطة البداية)
    # نستخدم log لجمع الاحتمالات بدلاً من ضربها
    prior_ham = math.log(h_total / (h_total + s_total))
    prior_spam = math.log(s_total / (h_total + s_total))

    # د. بناء الاستعلام الذكي (CTE + Left Join + Coalesce)
    # سننشئ placeholders بعدد كلمات الرسالة
    placeholders = ", ".join(["(?)"] * len(words_list))
    
    # اختيار قيمة Smoothing صغيرة (مثلاً 0.01)
    smoothing_value = 0.01

    query = f"""
    WITH raw_msg(word) AS (
        VALUES {placeholders}
    ),
    counted_msg AS (
        -- SQL يقوم بعدّ تكرار الكلمات
        SELECT word, COUNT(*) as n FROM raw_msg GROUP BY word
    )
    SELECT 
        (SELECT {prior_ham} + SUM(
            counted_msg.n * LOG(
                COALESCE(ham_db.frequency, {smoothing_value}) * 1.0 / {h_total}
            )
        )
        FROM counted_msg
        LEFT JOIN ham AS ham_db ON counted_msg.word = ham_db.word) as ham_score,
        
        (SELECT {prior_spam} + SUM(
            counted_msg.n * LOG(
                COALESCE(spam_db.frequency, {smoothing_value}) * 1.0 / {s_total}
            )
        )
        FROM counted_msg
        LEFT JOIN spam AS spam_db ON counted_msg.word = spam_db.word) as spam_score
    """

    # هـ. تنفيذ الاستعلام وتمرير الكلمات كـ parameters (آمن وسريع)
    cursor.execute(query, words_list)
    scores = cursor.fetchone()
    ham_score = scores[0]
    spam_score = scores[1]

    conn.close()

    # و. اتخاذ القرار النهائي
    return "SPAM" if spam_score > ham_score else "HAM"

